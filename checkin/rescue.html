<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦈 Resgate de Fotos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    p { color: #aaa; margin-bottom: 24px; text-align: center; font-size: 0.95rem; }
    #log {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 480px;
      font-size: 0.85rem;
      line-height: 1.8;
      min-height: 120px;
      margin-bottom: 20px;
      color: #ccc;
    }
    .ok { color: #34c759; }
    .err { color: #ff453a; }
    .info { color: #64b5f6; }
    button {
      background: linear-gradient(135deg, #007aff, #5856d6);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 480px;
    }
    button:disabled { opacity: 0.4; }
    #progress {
      width: 100%;
      max-width: 480px;
      background: #222;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #007aff, #34c759);
      width: 0%;
      transition: width 0.3s;
    }
    .thumb-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 480px;
      margin-top: 16px;
    }
    .thumb-grid img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <h1>🦈 Resgate de Fotos</h1>
  <p>Este utilitário lê o banco de dados local deste iPad<br>e envia as fotos dos atletas para o servidor.</p>

  <div id="log">Pronto. Pressione o botão para iniciar.</div>
  <div id="progress"><div id="progress-bar"></div></div>
  <button id="btn-start" onclick="startRescue()">Iniciar Resgate</button>
  <div class="thumb-grid" id="thumb-grid"></div>

  <script>
    const DB_NAME = 'TutubasDB';
    const STORE_NAME = 'athletesStore';
    const SERVER = 'https://www.tubaroescansados.com.br';

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      el.innerHTML += `<span class="${cls}">${msg}</span><br>`;
      el.scrollTop = el.scrollHeight;
    }

    function setProgress(pct) {
      const bar = document.getElementById('progress-bar');
      document.getElementById('progress').style.display = 'block';
      bar.style.width = pct + '%';
    }

    function addThumb(dataUrl) {
      const img = document.createElement('img');
      img.src = dataUrl;
      document.getElementById('thumb-grid').appendChild(img);
    }

    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function readAthletes(db) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('tutubas_athletes');
        req.onsuccess = () => resolve(req.result ? JSON.parse(req.result) : []);
        req.onerror = () => reject(req.error);
      });
    }

    async function sendSyncToServer(athletes) {
      const res = await fetch(SERVER + '/checkin/data.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(athletes)
      });
      return res.ok;
    }

    async function startRescue() {
      const btn = document.getElementById('btn-start');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      try {
        log('🔍 Abrindo banco de dados local...', 'info');
        const db = await openDB();
        log('✅ Banco aberto com sucesso!', 'ok');

        log('📦 Lendo dados dos atletas...', 'info');
        const athletes = await readAthletes(db);
        log(`ℹ️ Total de atletas encontrados: <strong>${athletes.length}</strong>`, 'info');

        const comFoto = athletes.filter(a => a.fotoUrl && a.fotoUrl.startsWith('data:'));
        const comCheckin = athletes.filter(a => a.checkinRealizado);

        log(`📸 Atletas com foto salva: <strong>${comFoto.length}</strong>`, 'info');
        log(`✅ Atletas com check-in feito: <strong>${comCheckin.length}</strong>`, 'info');

        if (comFoto.length === 0 && comCheckin.length === 0) {
          log('⚠️ Nenhuma foto ou check-in encontrado neste dispositivo.', 'err');
          btn.disabled = false;
          return;
        }

        // Mostra thumbs
        comFoto.slice(0, 20).forEach(a => addThumb(a.fotoUrl));

        log('📡 Enviando dados para o servidor...', 'info');
        setProgress(10);

        const ok = await sendSyncToServer(athletes);
        setProgress(90);

        if (ok) {
          log('✅ Dados sincronizados com o servidor!', 'ok');
          log(`🦈 <strong>${comCheckin.length} check-ins</strong> e <strong>${comFoto.length} fotos</strong> enviados.`, 'ok');
          setProgress(100);
        } else {
          log('❌ Erro ao sincronizar. Verifique a conexão com a internet.', 'err');
        }

      } catch (e) {
        log('❌ Erro: ' + e.message, 'err');
        console.error(e);
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
